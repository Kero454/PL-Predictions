<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
<defs>
<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#0f0c29"/>
<stop offset="50%" stop-color="#1a1a2e"/>
<stop offset="100%" stop-color="#16213e"/>
</linearGradient>
<linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#00d2ff"/>
<stop offset="100%" stop-color="#7b2ff7"/>
</linearGradient>
</defs>
<rect width="192" height="192" rx="42" fill="url(#bg)"/>
<!-- Football/soccer ball outline -->
<circle cx="96" cy="82" r="38" fill="none" stroke="url(#accent)" stroke-width="3"/>
<!-- Pentagon pattern on ball -->
<polygon points="96,58 109,68 105,84 87,84 83,68" fill="url(#accent)" opacity="0.25"/>
<polygon points="96,58 109,68 105,84 87,84 83,68" fill="none" stroke="url(#accent)" stroke-width="1.5"/>
<!-- Crosshair / target lines -->
<line x1="96" y1="44" x2="96" y2="54" stroke="#00d2ff" stroke-width="2" stroke-linecap="round"/>
<line x1="96" y1="110" x2="96" y2="120" stroke="#00d2ff" stroke-width="2" stroke-linecap="round"/>
<line x1="58" y1="82" x2="68" y2="82" stroke="#00d2ff" stroke-width="2" stroke-linecap="round"/>
<line x1="124" y1="82" x2="134" y2="82" stroke="#00d2ff" stroke-width="2" stroke-linecap="round"/>
<!-- Text -->
<text x="96" y="152" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="800" font-family="Arial, sans-serif" letter-spacing="3">PREDICT</text>
<text x="96" y="170" text-anchor="middle" fill="#00d2ff" font-size="11" font-weight="600" font-family="Arial, sans-serif" letter-spacing="4" opacity="0.7">PREMIER LEAGUE</text>
</svg>