<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
<defs>
<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#0f0c29"/>
<stop offset="50%" stop-color="#1a1a2e"/>
<stop offset="100%" stop-color="#16213e"/>
</linearGradient>
<linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#00d2ff"/>
<stop offset="100%" stop-color="#7b2ff7"/>
</linearGradient>
</defs>
<rect width="512" height="512" rx="110" fill="url(#bg)"/>
<!-- Football/soccer ball outline -->
<circle cx="256" cy="215" r="102" fill="none" stroke="url(#accent)" stroke-width="7"/>
<!-- Pentagon pattern on ball -->
<polygon points="256,150 291,177 278,219 234,219 221,177" fill="url(#accent)" opacity="0.25"/>
<polygon points="256,150 291,177 278,219 234,219 221,177" fill="none" stroke="url(#accent)" stroke-width="3.5"/>
<!-- Crosshair / target lines -->
<line x1="256" y1="113" x2="256" y2="140" stroke="#00d2ff" stroke-width="5" stroke-linecap="round"/>
<line x1="256" y1="290" x2="256" y2="317" stroke="#00d2ff" stroke-width="5" stroke-linecap="round"/>
<line x1="154" y1="215" x2="181" y2="215" stroke="#00d2ff" stroke-width="5" stroke-linecap="round"/>
<line x1="331" y1="215" x2="358" y2="215" stroke="#00d2ff" stroke-width="5" stroke-linecap="round"/>
<!-- Text -->
<text x="256" y="400" text-anchor="middle" fill="#ffffff" font-size="58" font-weight="800" font-family="Arial, sans-serif" letter-spacing="8">PREDICT</text>
<text x="256" y="448" text-anchor="middle" fill="#00d2ff" font-size="28" font-weight="600" font-family="Arial, sans-serif" letter-spacing="10" opacity="0.7">PREMIER LEAGUE</text>
</svg>